name: Build MLM Manager

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Windows portable exe
        run: npm run build-win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MLM-Manager-Windows
          path: dist/MLM-Manager.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Mac DMG
        run: npm run build-mac

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: MLM-Manager-Mac
          path: dist/MLM-Manager.dmg

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: MLM-Manager-Windows
          path: dist/

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: MLM-Manager-Mac
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          name: MLM Manager v1.0.0
          files: |
            dist/MLM-Manager.exe
            dist/MLM-Manager.dmg
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
