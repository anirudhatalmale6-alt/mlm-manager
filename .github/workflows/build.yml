name: Build MLM.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests websocket-client keyboard pywin32 Pillow pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name MLM mlm.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.37-${{ github.run_number }}
          name: MLM v1.0.37 Build ${{ github.run_number }}
          files: dist/MLM.exe
          make_latest: true
